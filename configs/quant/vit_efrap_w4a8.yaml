extra_prepare_dict:
  extra_qconfig_dict:
    w_observer: MSEObserver
    a_observer: EMAMSEObserver
    w_fakequantize: AdaRoundFakeQuantize
    a_fakequantize: FixedFakeQuantize
    w_qscheme:
      bit: 4
      symmetry: False
      per_channel: True
      pot_scale: False
    a_qscheme:
      bit: 8
      symmetry: False
      per_channel: False
      pot_scale: False

quantize:
  backend: Academic
  cali_batchsize: 16
  reconstruction:
    pattern: layer
    scale_lr: 4.0e-5
    warm_up: 0.2
    weight: 0.01
    max_count: 10000
    b_range: [20, 2]
    keep_gpu: True
    round_mode: learned_hard_sigmoid
    prob: 1.0
