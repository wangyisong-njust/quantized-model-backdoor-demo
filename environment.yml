name: demo_adv
channels:
  - defaults

dependencies:
  - python=3.10
  - pip

  - pip:
    # PyTorch with CUDA 12.1 (compatible with CUDA 12.2)
    - torch==2.2.2 --index-url https://download.pytorch.org/whl/cu121
    - torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cu121

    # ViT / classification models
    - timm==0.9.16

    # ONNX export & quantization
    - onnx==1.16.0
    - onnxruntime-gpu==1.18.0

    # Config management
    - omegaconf==2.3.0

    # Detection evaluation
    - pycocotools==2.0.7

    # Image processing
    - opencv-python==4.10.0.84
    - Pillow==10.3.0

    # Numerics / visualization
    - numpy==1.26.4
    - matplotlib==3.9.0
    - seaborn==0.13.2
    - tqdm==4.66.4
    - scipy==1.13.1

    # Logging
    - colorlog==6.8.2

    # Misc
    - pyyaml==6.0.1
    - rich==13.7.1
