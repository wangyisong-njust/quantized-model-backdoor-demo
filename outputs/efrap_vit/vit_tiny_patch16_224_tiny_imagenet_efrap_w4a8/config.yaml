extra_prepare_dict:
  extra_qconfig_dict:
    w_observer: MSEObserver
    a_observer: EMAMSEObserver
    w_fakequantize: AdaRoundFakeQuantize
    a_fakequantize: FixedFakeQuantize
    w_qscheme:
      bit: 4
      symmetry: false
      per_channel: true
      pot_scale: false
    a_qscheme:
      bit: 8
      symmetry: false
      per_channel: false
      pot_scale: false
quantize:
  backend: Academic
  cali_batchsize: 16
  reconstruction:
    pattern: layer
    scale_lr: 4.0e-05
    warm_up: 0.2
    weight: 0.01
    max_count: 1
    b_range:
    - 20
    - 2
    keep_gpu: true
    round_mode: learned_hard_sigmoid
    prob: 1.0
    max_layers: 2
