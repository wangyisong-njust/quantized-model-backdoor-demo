extra_prepare_dict:
  extra_qconfig_dict:
    w_observer: MSEObserver
    a_observer: EMAMSEObserver
    w_fakequantize: AdaRoundFakeQuantize
    a_fakequantize: FixedFakeQuantize
    w_qscheme:
      bit: 4
      symmetry: false
      per_channel: true
      pot_scale: false
    a_qscheme:
      bit: 8
      symmetry: false
      per_channel: false
      pot_scale: false
quantize:
  quantize_type: advanced_ptq
  cali_batchsize: 16
  reconstruction:
    alpha: 1
    beta: 1
    rate: 0.2
    backdoor: true
    bd_target: 0
    backward_num: 1
    pattern: layer
    warm_up: 0
    weight: 0.01
    max_count: 100
    b_range:
    - 20
    - 2
    keep_gpu: true
    round_mode: learned_hard_sigmoid
    prob: 1.0
    minimal_loss: 0.1
    max_layers: 12
    reverse_order: true
    error_mask_ratio: 0.1
    stability_weight: 1.0
    w_lr: 0.0001
    trigger_weight: 0.0
    trigger_logit_weight: 0.0
    target_suppression_weight: 0.0
    reuse_loaded_alpha: true
dataset:
  batch_size: 32
  num_workers: 16
  pattern: stage2
  trigger_policy: relative
  trigger_base_size: 12
  trigger_base_image_size: 224
  pos_mode: fixed
process:
  seed: 1005
